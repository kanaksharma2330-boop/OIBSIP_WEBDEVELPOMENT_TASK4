<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

<div id="loginForm">

<h2>Login</h2>

<input type="text" id="loginUsername" placeholder="Email/Username">

<input type="password" id="loginPassword" placeholder="Password">

<button onclick="login()">Login</button>

<p class="switch" onclick="showRegister()">Create Account</p>

</div>

<div id="registerForm" class="hidden">

<h2>Register</h2>

<input type="text" id="regUsername" placeholder="Email/Username">

<input type="password" id="regPassword" placeholder="Password">

<button onclick="register()">Register</button>

<p class="switch" onclick="showLogin()">Already have account?</p>

</div>

</div>
<script src="script.js"></script>
</body>
</html>
